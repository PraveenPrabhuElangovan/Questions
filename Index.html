<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How Well Do You Know Me? 💖</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to right, #ffe4ec, #f3e5f5);
  text-align: center;
  color: #444;
}

.container {
  max-width: 600px;
  margin: 50px auto;
}

.question {
  background: white;
  padding: 20px;
  margin: 20px 0;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

button {
  display: block;
  margin: 10px auto;
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
}

.correct { background: #4caf50 !important; }
.wrong { background: #f44336 !important; }

#result {
  font-size: 1.5rem;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">
  <h1>How Well Do You Know Me? 💖</h1>

  <!-- Question 1 -->
  <div class="question">
    <p>1. What is my favorite food?</p>
    <button onclick="check(this, false)">Biryani 🍗</button>
    <button onclick="check(this, false)">Pizza 🍕</button>
    <button onclick="check(this, true)">Dosa 🥘</button>
  </div>

  <!-- Question 2 -->
  <div class="question">
    <p>2. What do I love the most?</p>
    <button onclick="check(this, false)">Sleeping 😴</button>
    <button onclick="check(this, true)">You ❤️</button>
    <button onclick="check(this, false)">Drive 🚗</button>
  </div>

  <!-- Question 3 -->
  <div class="question">
    <p>3. My favorite time to talk to you?</p>
    <button onclick="check(this, false)">Morning 🌅</button>
    <button onclick="check(this, false)">Afternoon ☀️</button>
    <button onclick="check(this, true)">Anytime 😍</button>
  </div>

<!-- Question 4 -->
  <div class="question">
    <p>4. If we fight, what do I want??</p>
    <button onclick="check(this, true)">To fix things with you ❤️</button>    
    <button onclick="check(this, false)">To win 😎</button>
    <button onclick="check(this, false)">Silence 🤐</button>
    
  </div>

<!-- Question 5 -->
  <div class="question">
    <p>5. What are you to me?</p>
    <button onclick="check(this, false)">My friend 🤝</button>
    <button onclick="check(this, true)">Everything 💖</button>
    <button onclick="check(this, false)">My happiness ❤️</button>
    
  </div>

<!-- Question 6 -->
  <div class="question">
    <p>6. Which moment I can never forget?</p>
    <button onclick="check(this, false)">First chat 💬</button>
    <button onclick="check(this, false)">First call 📞</button>
    <button onclick="check(this, true)">First meet ❤️</button>
  </div>

<!-- Question 7 -->
  <div class="question">
    <p>7. What nickname do I call you?</p>
    <button onclick="check(this, false)">Baby 💕</button>
    <button onclick="check(this, true)">Pattu 😘</button>
    <button onclick="check(this, false)">My Love ❤️</button>
  </div>

  <button onclick="showResult()">See Result 💖</button>

  <div id="result"></div>
</div>

<script>
let score = 0;

function check(button, isCorrect) {
  if (button.classList.contains('clicked')) return;

  button.classList.add('clicked');

  if (isCorrect) {
    button.classList.add('correct');
    score++;
  } else {
    button.classList.add('wrong');
  }
}

function showResult() {
  let resultText = "";

  if (score === 7) {
    resultText = "Perfect! You know me so well ❤️";
  } else if (score === 4) {
    resultText = "Almost there! You still love me 😘";
  } else {
    resultText = "Hmm... you need to know me better 😜";
  }

  document.getElementById("result").innerText = 
    "Your Score: " + score + "/7 💖\n" + resultText;
}
</script>

</body>
</html>
